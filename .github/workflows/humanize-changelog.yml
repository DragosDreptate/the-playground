name: Humanize Changelog

# Se déclenche sur la PR Release Please (ouverte ou mise à jour)
on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  humanize:
    name: Réécriture changelog en langage utilisateur
    # Ne tourne que sur les PRs de Release Please
    if: startsWith(github.head_ref, 'release-please--')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      # Skip rapide : les commits vides poussés par /release pour déclencher le CI
      # ne modifient pas CHANGELOG.md — inutile d'installer les deps et d'appeler Claude.
      # On compare avec origin/main (la base de la PR), pas HEAD~1 qui ne voit que le dernier commit.
      - name: Vérifier si CHANGELOG.md a changé
        id: check-changelog
        run: |
          if git diff origin/main --name-only | grep -q "^CHANGELOG.md$"; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "CHANGELOG.md inchangé — skip."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.check-changelog.outputs.changed == 'true'
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        if: steps.check-changelog.outputs.changed == 'true'
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Installer les dépendances
        if: steps.check-changelog.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      # Boucle retry : Release Please peut force-push la branche pendant que
      # ce workflow tourne, causant un rejet du push. On recommence à zéro
      # (fetch + reset + humanise + commit + push) jusqu'à 3 fois.
      - name: Humaniser et committer (avec retry)
        if: steps.check-changelog.outputs.changed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BRANCH: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for i in 1 2 3; do
            echo "=== Tentative $i/3 ==="

            # Repartir du HEAD distant (en cas de force-push entre-temps)
            git fetch origin "$BRANCH"
            git reset --hard "origin/$BRANCH"

            # Humaniser
            pnpm tsx scripts/humanize-changelog.ts

            # Vérifier si le script a modifié quelque chose
            if git diff --quiet; then
              echo "Changelog déjà au format utilisateur — rien à committer."
              exit 0
            fi

            # Committer et pousser
            git add CHANGELOG.md
            git commit -m "docs(changelog): réécriture automatique en langage utilisateur [skip ci]"

            if git push origin "$BRANCH"; then
              echo "Push réussi à la tentative $i."
              exit 0
            fi

            echo "Push rejeté — Release Please a probablement force-push entre-temps."
          done

          echo "Échec après 3 tentatives."
          exit 1
