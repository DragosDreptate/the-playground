name: Sync version

on:
  push:
    branches:
      - main
    paths:
      - CHANGELOG.md

permissions:
  contents: write

jobs:
  sync-version:
    name: sync-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Token avec droits d'écriture pour pouvoir pusher le commit de sync
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version from CHANGELOG.md
        run: pnpm version:sync

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && echo "No changes to commit" && exit 0
          git add package.json .release-please-manifest.json
          git commit -m "chore(release): sync version from CHANGELOG.md [skip ci]"
          git push
